service: mcp-proxy

frameworkVersion: "3"

plugins:
  - serverless-plugin-typescript

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 30
  environment:
    MCP_CONFIG_PATH: ./config/tools.yaml
    NODE_ENV: production

package:
  patterns:
    - "!**"
    - "src/**"
    - "config/**"
    - "schema/**"
    - "package.json"
    - "tsconfig.json"

functions:
  mcp:
    handler: src/index.handler
    events:
      - httpApi:
          path: /mcp
          method: POST
      - httpApi:
          path: /mcp
          method: GET
      - httpApi:
          path: /mcp
          method: DELETE
